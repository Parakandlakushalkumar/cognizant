<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript To-Do Hands-On</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
        }

        li {
            margin: 8px 0;
        }

        .completed {
            color: #0f766e;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <!-- Topic: DOM elements used by JavaScript -->
    <main>
        <h1>JavaScript Task Tracker</h1>
        <input id="taskInput" type="text" placeholder="Enter a learning task">
        <button id="addTaskButton">Add Task</button>
        <ul id="taskList"></ul>
    </main>

    <script>
        // Topic: selecting elements from the DOM
        const taskInput = document.querySelector("#taskInput");
        const addTaskButton = document.querySelector("#addTaskButton");
        const taskList = document.querySelector("#taskList");

        // Topic: array used as simple application state
        const tasks = ["Revise functions", "Practice DOM events"];

        // Topic: rendering data to the page
        function renderTasks() {
            taskList.innerHTML = "";

            tasks.forEach((task, index) => {
                const item = document.createElement("li");
                item.textContent = task;
                item.addEventListener("click", () => item.classList.toggle("completed"));

                const removeButton = document.createElement("button");
                removeButton.textContent = "Remove";
                removeButton.addEventListener("click", () => {
                    tasks.splice(index, 1);
                    renderTasks();
                });

                item.append(" ", removeButton);
                taskList.appendChild(item);
            });
        }

        // Topic: event handling and input validation
        addTaskButton.addEventListener("click", () => {
            const task = taskInput.value.trim();

            if (task.length === 0) {
                alert("Please enter a task.");
                return;
            }

            tasks.push(task);
            taskInput.value = "";
            renderTasks();
        });

        renderTasks();
    </script>
</body>
</html>
