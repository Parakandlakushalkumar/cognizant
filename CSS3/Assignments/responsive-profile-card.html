<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS3 Responsive Profile Card</title>
    <link rel="stylesheet" href="responsive-profile-card.css">
</head>
<body>
    <!-- Topic: semantic structure for a profile card -->
    <main class="page">
        <section class="profile-card">
            <div class="avatar">S</div>
            <h1>Student Learning Profile</h1>
            <p class="role">Upskilling learner</p>
            <p>I practiced CSS selectors, spacing, layout, responsive design, transitions, and visual hierarchy.</p>

            <!-- Topic: reusable badge components -->
            <div class="skills">
                <span>HTML5</span>
                <span>CSS3</span>
                <span>Responsive UI</span>
            </div>
        </section>
    </main>
</body>
</html>
