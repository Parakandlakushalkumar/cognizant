<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Form Validation Hands-On</title>
</head>
<body>
    <!-- Topic: accessible form structure -->
    <main>
        <h1>Course Registration Form</h1>
        <form action="#" method="post">
            <!-- Topic: label and required input -->
            <p>
                <label for="studentName">Student Name</label>
                <input type="text" id="studentName" name="studentName" required minlength="3">
            </p>

            <!-- Topic: email validation using HTML5 input type -->
            <p>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </p>

            <!-- Topic: number validation with min and max -->
            <p>
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="18" max="60" required>
            </p>

            <!-- Topic: select and textarea controls -->
            <p>
                <label for="topic">Preferred Topic</label>
                <select id="topic" name="topic" required>
                    <option value="">Choose one</option>
                    <option value="html5">HTML5</option>
                    <option value="css3">CSS3</option>
                    <option value="javascript">JavaScript</option>
                </select>
            </p>

            <p>
                <label for="goal">Learning Goal</label>
                <textarea id="goal" name="goal" rows="4" required></textarea>
            </p>

            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
